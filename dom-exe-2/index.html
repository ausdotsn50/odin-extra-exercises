<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping list example</title>
    <style>
      li {
        margin-bottom: 10px;
      }

      li button {
        font-size: 12px;
        margin-left: 20px;
        color: #666;
      }
    </style>
  </head>
  <body>

    <h1>My shopping list</h1>

    <form autocomplete="off" autofocus="">
      <label for="item">Enter a new item:</label>
      <input id="inputRef" type="text" name="item" id="item">
      <button id="button">Add item</button>
    </form>

    <ul id="listRef">

    </ul>

    <script>
        const listRef = document.querySelector("#listRef");
        const inputRef = document.querySelector("#inputRef");
        const button = document.querySelector("#button");

        // add prevent default to cancel auto 'submit'
        button.addEventListener('click', (event) => {
            event.preventDefault();
            // alert("Button clicked!");

            const value = inputRef.value;
            inputRef.value = "";
        
            const listElement = document.createElement("li");
            const spanElement = document.createElement("span");
            const buttonElement = document.createElement("button");

            // Appending children for listElement
            listElement.appendChild(spanElement);
            listElement.appendChild(buttonElement);

            spanElement.textContent = value;
            buttonElement.textContent = "Delete";

            buttonElement.addEventListener('click', (event) => {
                event.preventDefault();
                listElement.remove();
            });

            listRef.appendChild(listElement);

            value = "clear";
        });

        
        

        

    </script>
  </body>
</html>
